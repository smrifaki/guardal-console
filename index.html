<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#0b1120;
    --muted:#5b647a; --faint:#8a93a6; --line:rgba(11,17,32,.14); --line-2:rgba(11,17,32,.08);
    --accent:#4f72ad;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --serif:"IBM Plex Sans",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:var(--sans);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow-x:hidden}

  /* ---- homepage WebGL blobs: top-left + bottom-right ---- */
  .gz-blob{position:fixed;inset:0;overflow:hidden;z-index:0;pointer-events:none}
  .gz-blob canvas{position:absolute;max-width:none;height:auto!important;pointer-events:none}
  .gz-blob .blob-canvas-anchor{position:absolute;inset:0}
  .gz-blob-tl{transform:scaleX(-1)}

  a{color:inherit;text-decoration:none}
  img{display:block}

  /* ---- top nav ---- */
  .nav{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;padding:1.25rem clamp(1.25rem,4vw,3rem)}
  .nav-logo{display:inline-flex;align-items:center;gap:.55rem;font-weight:600;font-size:1.12rem;letter-spacing:-.01em;color:var(--ink)}
  .nav-logo img{width:26px;height:26px}
  .nav-back{font-size:.9rem;color:var(--muted);display:inline-flex;align-items:center;gap:.45rem;transition:color .18s ease}
  .nav-back:hover{color:var(--ink)}
  .nav-back svg{width:15px;height:15px}

  /* ---- centered sign-in ---- */
  .wrap{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:clamp(1.5rem,5vw,3rem)}
  .card{width:100%;max-width:25rem;text-align:center;background:var(--card);border:1px solid var(--line-2);border-radius:20px;padding:clamp(1.9rem,5vw,2.9rem);box-shadow:0 24px 70px -28px rgba(11,17,32,.28)}
  .card-logo{display:inline-flex;align-items:center;gap:.55rem;font-size:1.12rem;font-weight:600;letter-spacing:-.01em;color:var(--ink);margin-bottom:1.8rem}
  .card-logo img{width:24px;height:24px}
  .card h1{font-family:var(--serif);font-weight:700;font-size:1.6rem;letter-spacing:-.03em;color:var(--ink)}
  .card .eyebrow{font-family:var(--sans);font-size:.82rem;letter-spacing:normal;text-transform:none;color:var(--faint);margin:1.1rem 0 1.2rem}

  /* pill buttons */
  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:.6rem;height:48px;border-radius:100vw;font-family:var(--sans);font-size:.95rem;font-weight:600;cursor:pointer;border:1px solid transparent;transition:transform .12s ease,background .18s ease,border-color .18s ease,opacity .18s ease}
  .btn:active{transform:translateY(1px)}
  .btn-google{background:#fff;color:#1a1a1a;border-color:#dadfe7}
  .btn-google:hover{border-color:#b9c1cf}
  .btn-google svg{width:18px;height:18px}
  .btn-github{background:#fff;color:#1a1a1a;border-color:#dadfe7;margin-top:.7rem}
  .btn-github:hover{border-color:#b9c1cf}
  .btn-github svg{width:18px;height:18px}
  .btn-email{background:var(--ink);color:#fff;border-color:var(--ink);margin-top:.7rem}
  .btn-email:hover{opacity:.9}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);margin-top:.7rem}
  .btn-primary:hover{background:#5a80c0;border-color:#5a80c0}
  .btn .arr{width:15px;height:15px}

  .email-form{display:none;margin-top:.7rem;text-align:left}
  .email-form.open{display:block}
  .email-form label{display:block;font-family:var(--sans);font-size:.82rem;letter-spacing:normal;text-transform:none;color:var(--muted);margin-bottom:.5rem}
  .email-form input{width:100%;height:48px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:0 1rem;font-family:var(--sans);font-size:.95rem;outline:none;transition:border-color .18s ease}
  .email-form input::placeholder{color:var(--faint)}
  .email-form input:focus{border-color:var(--accent)}
  .recaptcha-slot{margin:.9rem 0 .1rem;display:flex;justify-content:center;min-height:0}
  .foot-note{margin-top:1.5rem;font-size:.82rem;color:var(--faint);line-height:1.6}
  .foot-note a{color:var(--muted);border-bottom:1px solid var(--line)}
  .foot-note a:hover{color:var(--ink);border-color:rgba(11,17,32,.4)}
  .consent{margin-top:1.3rem;font-size:.78rem;color:var(--faint);line-height:1.6}
  .consent a{color:var(--muted);text-decoration:underline;text-underline-offset:2px}
  .consent a:hover{color:var(--ink)}

  /* ---- footer (no logo) ---- */
  .site-foot{position:relative;z-index:2;display:flex;flex-wrap:wrap;align-items:center;gap:.8rem 2rem;justify-content:space-between;padding:1.5rem clamp(1.25rem,4vw,3rem);background:#0b1120}
  .foot-links{display:flex;gap:1.4rem;font-size:.9rem;color:rgba(255,255,255,.7)}
  .foot-links a:hover{color:#fff}
  .foot-copy{font-family:var(--sans);font-size:.9rem;color:#fff}

  /* custom cursors (match guardal.ai) */
  html{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2219%22%20height%3D%2226%22%20viewBox%3D%220.74%200.60%2021.59%2029.16%22%3E%3Cpath%20d%3D%22M2.2%202%20L2.2%2025.6%20L8.9%2019.7%20L12.7%2028.4%20L16.6%2026.6%20L12.8%2018.2%20L21%2018.2%20Z%22%0A%20%20%20%20%20%20%20%20fill%3D%22%231A1A1C%22%20stroke%3D%22%23ffffff%22%20stroke-width%3D%222%22%20stroke-linejoin%3D%22round%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E") 1 1, url(https://guardal.ai/assets/cur-arrow-v4.png) 0 0, auto}
  a,button,[role=button],summary,label[for],select,.btn,.btn-google,.btn-email,.btn-primary,.nav-back,input[type=submit],input[type=button]{cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2220%22%20height%3D%2227%22%20viewBox%3D%221.89%200.24%2023.44%2030.94%22%3E%3Cg%20stroke%3D%22%23fff%22%20stroke-width%3D%222.6%22%20stroke-linejoin%3D%22round%22%20fill%3D%22%23fff%22%3E%3Crect%20x%3D%229.4%22%20y%3D%222%22%20width%3D%224.4%22%20height%3D%2215%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2213.9%22%20y%3D%2210.5%22%20width%3D%223.7%22%20height%3D%227.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%2217.2%22%20y%3D%2211.5%22%20width%3D%223.7%22%20height%3D%226.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%2220.3%22%20y%3D%2213%22%20width%3D%223.4%22%20height%3D%225.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%223.6%22%20y%3D%2215.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221.1%22%2F%3E%3Cpath%20d%3D%22M7%2015%20H21%20L23.6%2018%20V24%20L20%2029.5%20H10.5%20L6.4%2024%20V18%20Z%22%2F%3E%3C%2Fg%3E%3Cg%20fill%3D%22%231A1A1C%22%3E%3Crect%20x%3D%229.4%22%20y%3D%222%22%20width%3D%224.4%22%20height%3D%2215%22%20rx%3D%221.2%22%2F%3E%3Crect%20x%3D%2213.9%22%20y%3D%2210.5%22%20width%3D%223.7%22%20height%3D%227.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%2217.2%22%20y%3D%2211.5%22%20width%3D%223.7%22%20height%3D%226.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%2220.3%22%20y%3D%2213%22%20width%3D%223.4%22%20height%3D%225.5%22%20rx%3D%221%22%2F%3E%3Crect%20x%3D%223.6%22%20y%3D%2215.5%22%20width%3D%225%22%20height%3D%225%22%20rx%3D%221.1%22%2F%3E%3Cpath%20d%3D%22M7%2015%20H21%20L23.6%2018%20V24%20L20%2029.5%20H10.5%20L6.4%2024%20V18%20Z%22%2F%3E%3C%2Fg%3E%3C%2Fsvg%3E") 8 2, url(https://guardal.ai/assets/cur-hand-v4.png) 8 0, pointer}
  input[type=text],input[type=email],input[type=password],input[type=search],textarea{cursor:text}
</style>

<script src="https://www.google.com/recaptcha/enterprise.js" async defer></script>

<body>
  <div class="gz-blob gz-blob-tl"><div class="blob-canvas-anchor" data-align="top-right" data-blob-set="1"></div></div>
  <div class="gz-blob gz-blob-br"><div class="blob-canvas-anchor" data-align="bottom-right" data-blob-set="2"></div></div>
  <header class="nav">
    <a class="nav-logo" href="https://guardal.ai/" aria-label="Guardal home"><img src="/assets/logo.svg" alt="" width="26" height="26">Guardal</a>
    <a class="nav-back" href="https://guardal.ai/">Back to site <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8h9M9 4l4 4-4 4"/></svg></a>
  </header>

  <main class="wrap">
    <div class="card">
      <span class="card-logo"><img src="/assets/logo.svg" alt="" width="24" height="24">Guardal</span>
      <h1>Enter the lab</h1>
      <div class="eyebrow">Sign in to the console</div>

      <button class="btn btn-google" id="g-btn" type="button">
        <svg viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.33A9 9 0 009 18z"/><path fill="#FBBC05" d="M3.97 10.72A5.4 5.4 0 013.68 9c0-.6.1-1.18.29-1.72V4.95H.96A9 9 0 000 9c0 1.45.35 2.83.96 4.05l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 00.96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <button class="btn btn-github" id="gh-btn" type="button">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="#1a1a1a" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        Continue with GitHub
      </button>
      <button class="btn btn-email" id="email-btn" type="button">Continue with email</button>

      <form class="email-form" id="email-form">
        <label for="email">Work email</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="you@company.com" required>
        <div id="recaptcha-slot" class="recaptcha-slot" aria-label="Human verification"></div>
        <button class="btn btn-primary" type="submit">Continue <svg class="arr" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8h9M9 4l4 4-4 4"/></svg></button>
      </form>

      <p class="consent">By continuing you agree to our <a href="https://guardal.ai/legal#terms">Terms of Service</a> and <a href="https://guardal.ai/legal#privacy">Privacy Policy</a>.</p>
      <p class="foot-note">Trouble signing in? <a href="mailto:support@guardal.ai?subject=Console%20access">Contact us</a></p>
    </div>
  </main>

  <footer class="site-foot">
    <nav class="foot-links"><a href="https://guardal.ai/">Home</a><a href="https://guardal.ai/about">About</a><a href="https://guardal.ai/blog/">Blog</a><a href="https://guardal.ai/careers">Careers</a></nav>
    <div class="foot-copy">&copy; 2026 Guardal</div>
  </footer>

  <script>
  /* Guardal sign-in. REAL Google auth via Google Identity Services (token model).
     The GIS client library is loaded in the page head (accounts.google.com/gsi/client).
     Cloud Console: add https://guardal.ai to "Authorized JavaScript origins"
     (token model needs NO redirect URI). Paste ONE real GOOGLE_CLIENT_ID below. */
  (function () {
    var emailBtn = document.getElementById('email-btn');
    var gBtn     = document.getElementById('g-btn');
    var ghBtn    = document.getElementById('gh-btn');
    var form     = document.getElementById('email-form');
    var card     = document.querySelector('.card');

    // Paste your OAuth 2.0 Web client ID here (APIs & Services > Credentials).
    // Public + safe to ship; do NOT put the client secret in this file.
    var GOOGLE_CLIENT_ID = "622968528047-hpq2slo1cfgm0sl54b5vludl6tpmapkr.apps.googleusercontent.com";

    var STORAGE_KEY = 'guardal.signin';
    var SESSION_MAX_AGE_MS = 24 * 60 * 60 * 1000; // 24h cosmetic cache, not a security boundary
    var USERINFO_URL = 'https://openidconnect.googleapis.com/v1/userinfo'; // canonical OIDC userinfo (CORS-enabled)
    var configured = GOOGLE_CLIENT_ID.indexOf('YOUR_GOOGLE_CLIENT_ID') === -1;
    var tokenClient = null;

    // ---- Google reCAPTCHA v2 on the email path ----
    var RECAPTCHA_SITE_KEY = "6LdCVxQtAAAAAFkruNcSrR7Co9hzunlHXQr-nryZ";
    var captchaToken = '', captchaId = null;
    window.__gCaptchaOk     = function (t) { captchaToken = t || ''; clearNote(); };
    window.__gCaptchaExpire = function ()  { captchaToken = ''; };
    function renderCaptcha(){
      if (captchaId !== null) return;
      var ent = window.grecaptcha && window.grecaptcha.enterprise;
      if (!ent || !ent.render) { return setTimeout(renderCaptcha, 60); }
      var slot = document.getElementById('recaptcha-slot');
      if (!slot) return;
      captchaId = ent.render(slot, {
        sitekey: RECAPTCHA_SITE_KEY, theme: 'light', action: 'login',
        callback: window.__gCaptchaOk, 'expired-callback': window.__gCaptchaExpire
      });
    }

    // ---- "Continue with email" toggle + reCAPTCHA-gated mailto (intentional email path) ----
    function openEmail(){ form.classList.add('open'); emailBtn.style.display='none'; renderCaptcha(); document.getElementById('email').focus(); }
    if (emailBtn) emailBtn.addEventListener('click', openEmail);
    if (form) form.addEventListener('submit', function(e){
      e.preventDefault();
      var email = document.getElementById('email');
      if (!email.value || !email.checkValidity()) { email.reportValidity(); return; }
      if (!captchaToken) { showNote('Please confirm you are human.'); return; }
      var v = encodeURIComponent(email.value);
      window.location.href = 'mailto:hello@guardal.ai?subject=Console%20access&body=Please%20provision%20console%20access%20for%20'+v;
    });

    // ---- inline status note under the Google button (honest errors, never a fake) ----
    var note = document.createElement('p');
    note.id = 'g-note';
    note.style.cssText = 'margin:.6rem 0 0;font-size:.74rem;line-height:1.5;color:var(--faint);display:none;text-align:center';
    if (gBtn && gBtn.parentNode) gBtn.parentNode.insertBefore(note, gBtn.nextSibling);
    function showNote(msg){ note.textContent = msg; note.style.display = 'block'; }
    function clearNote(){ note.textContent = ''; note.style.display = 'none'; }

    function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    }); }

    // ---- GIS token client (opens a real Google popup from a user gesture) ----
    function initGoogleAuth(){
      if (!configured) return;
      if (!window.google || !google.accounts || !google.accounts.oauth2){
        return setTimeout(initGoogleAuth, 50); // async/defer gsi client not ready yet
      }
      if (tokenClient) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'openid email profile',
        callback: handleTokenResponse,
        error_callback: handleTokenError
      });
    }
    if (configured) initGoogleAuth();

    // ---- Click: REAL Google sign-in. requestAccessToken() MUST run synchronously
    //      inside this handler or the popup is blocked. ----
    if (gBtn) gBtn.addEventListener('click', function(){
      clearNote();
      if (!configured){ showNote('Google sign-in is not configured yet.'); return; }
      if (!tokenClient){ initGoogleAuth(); showNote('Starting Google sign-in, click again.'); return; }
      gBtn.disabled = true;
      try {
        tokenClient.requestAccessToken({ prompt: 'select_account' });
      } catch (err){
        gBtn.disabled = false;
        showNote('Could not open Google sign-in. Try again.');
      }
    });

    // ---- "Continue with GitHub": starts the GitHub OAuth web flow when configured.
    //      GitHub has no pure client-side flow (the code->token exchange needs the client
    //      secret), so completing sign-in requires a small backend at the redirect URI
    //      (e.g. a Cloudflare Worker). Paste your OAuth App client ID below to enable it. ----
    // ---- "Continue with GitHub": real OAuth via Supabase Auth. Supabase holds the
    //      GitHub client secret server-side and completes the code->token exchange, which a
    //      static page cannot do. Paste your Supabase project values below (both PUBLIC and
    //      safe to ship; never put a client secret here). Setup: create a Supabase project,
    //      register a GitHub OAuth App with callback https://<ref>.supabase.co/auth/v1/callback,
    //      then enable Authentication > Providers > GitHub with that app's client id + secret. ----
    var SUPABASE_URL = "https://jojtttnqpdznydtrrmxv.supabase.co";
    var SUPABASE_ANON_KEY = "sb_publishable_ltUJrbAok-LM-S0lZaZDVg_oxlU5Zzi";
    var sbConfigured = /^https:\/\/[a-z0-9]+\.supabase\.co$/.test(SUPABASE_URL) && /^sb_publishable_|^eyJ/.test(SUPABASE_ANON_KEY);
    function onSignedIn(session){
      var u = session && session.user || {};
      var who = u.email || (u.user_metadata && (u.user_metadata.user_name || u.user_metadata.name)) || 'your account';
      showNote('Signed in as ' + esc(who) + '.');
    }
    // Lazily create the client so load order with the deferred supabase-js script never matters.
    var sb = null;
    function getSb(){
      if (sb) return sb;
      if (!sbConfigured || !window.supabase || !window.supabase.createClient) return null;
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      // Supabase auto-detects the session returned in the URL after the GitHub redirect.
      sb.auth.getSession().then(function(r){ if (r && r.data && r.data.session) onSignedIn(r.data.session); });
      sb.auth.onAuthStateChange(function(_e, session){ if (session) onSignedIn(session); });
      return sb;
    }
    (function waitSb(n){ if (getSb() || n <= 0) return; setTimeout(function(){ waitSb(n - 1); }, 60); })(50);
    if (ghBtn) ghBtn.addEventListener('click', function(){
      clearNote();
      var client = getSb();
      if (!client){ showNote('GitHub sign-in is being set up.'); return; }
      ghBtn.disabled = true;
      client.auth.signInWithOAuth({
        provider: 'github',
        options: { scopes: 'read:user user:email', redirectTo: window.location.origin + '/' }
      }).then(function(r){
        if (r && r.error){ ghBtn.disabled = false; showNote('Could not start GitHub sign-in. Try again.'); }
      });
    });

    // Token model returns only an access_token -> fetch profile from official userinfo.
    async function handleTokenResponse(tokenResponse){
      gBtn.disabled = false;
      if (!tokenResponse || tokenResponse.error || !tokenResponse.access_token){
        showNote('Google sign-in did not complete. Try again.');
        return;
      }
      try {
        var res = await fetch(USERINFO_URL, {
          headers: { Authorization: 'Bearer ' + tokenResponse.access_token }
        });
        if (!res.ok) throw new Error('userinfo HTTP ' + res.status);
        var profile = await res.json();
        var session = {
          name: profile.name || profile.given_name || '',
          email: profile.email || '',
          email_verified: profile.email_verified === true,
          picture: profile.picture || '',
          sub: profile.sub || '',
          ts: Date.now()
        };
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(session)); } catch (e) {}
        renderSignedIn(session);
      } catch (err){
        showNote('Signed in with Google, but could not load your profile. Try again.');
      }
    }

    // Popup blocked / closed / other errors -> honest message, no fake.
    function handleTokenError(err){
      gBtn.disabled = false;
      var type = err && err.type ? err.type : '';
      if (type === 'popup_closed'){ showNote('Sign-in window closed before finishing.'); }
      else if (type === 'popup_failed_to_open'){ showNote('Popup blocked. Allow popups for this site, then try again.'); }
      else { showNote('Google sign-in was not completed. Try again.'); }
    }

    // ---- Honest signed-in state. No "access granted", no fake provisioning. ----
    function renderSignedIn(s){
      var verified = s.email_verified;
      var avatar = s.picture
        ? '<img src="'+esc(s.picture)+'" alt="" referrerpolicy="no-referrer" width="56" height="56" style="width:56px;height:56px;border-radius:50%;display:block;margin:0 auto 1rem;border:1px solid var(--line)">'
        : '';
      card.innerHTML =
        '<span class="card-logo"><img src="/assets/logo.svg" alt="" width="24" height="24">Guardal</span>' +
        avatar +
        '<h1>Signed in as ' + esc(s.name || s.email) + '</h1>' +
        '<div class="eyebrow">' + esc(s.email) + (verified ? '' : ' (unverified)') + '</div>' +
        '<p class="foot-note" style="margin-top:1.1rem">You are signed in with Google. The Guardal console is not live yet. We will email <strong style="color:var(--muted)">' + esc(s.email) + '</strong> when your workspace is ready.</p>' +
        '<button class="btn btn-email" id="signout-btn" type="button" style="margin-top:1.4rem">Sign out</button>';
      var signOut = document.getElementById('signout-btn');
      if (signOut) signOut.addEventListener('click', signOutHandler);
    }

    function signOutHandler(){
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
      if (window.google && google.accounts && google.accounts.id){
        try { google.accounts.id.disableAutoSelect(); } catch (e) {}
      }
      window.location.reload();
    }

    // ---- On load: repaint signed-in chrome from cache (UI convenience only,
    //      NOT an access decision). Expire stale cache. ----
    (function restore(){
      var raw;
      try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { return; }
      if (!raw) return;
      var s;
      try { s = JSON.parse(raw); } catch (e) { try { localStorage.removeItem(STORAGE_KEY); } catch (_) {} return; }
      if (!s || !s.email || !s.ts || (Date.now() - s.ts) > SESSION_MAX_AGE_MS){
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        return;
      }
      renderSignedIn(s);
    })();
  })();
  </script>
<style>
  .blob-container {
    position: relative;
    overflow: hidden;
  }

  .blob-container canvas {
    position: absolute;
    max-width: none;
    height: auto !important;
    pointer-events: none;
    z-index: 0;
    transform: translateZ(0); /* Fixes iOS flicker */
  }

  .blob-canvas-anchor {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js";

    script.onload = function () {
      const vertexShader = `varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

      const fragmentShader = `precision highp float;uniform float u_time;uniform vec2 u_resolution;uniform float u_blobSet;varying vec2 vUv;const int BLOB_COUNT=10;struct Blob{vec2 position;vec2 size;vec3 color;float blur;float opacity;float rotation;};Blob getBlob(int index, float set) {if(set == 0.0) {if(index == 0) return Blob(vec2(-1.5,-.7),vec2(1.5,1.5),pow(vec3(.76,.88,1.),vec3(2.2)),.8,1.,0.);if(index == 1) return Blob(vec2(-.195,-1.),vec2(.65,.4),pow(vec3(.76,.88,1.),vec3(2.2)),.5,.9,.97);if(index == 2) return Blob(vec2(-.4,-.85),vec2(.2,.5),pow(vec3(.475,.702,.925),vec3(2.2)),.5,1.,-.17);if(index == 3) return Blob(vec2(-.85,-.85),vec2(.7,.5),pow(vec3(.475,.702,.925),vec3(2.2)),.5,.95,.5);if(index == 4) return Blob(vec2(-.85,-.75),vec2(.4,.12),pow(vec3(.784,.757,.863),vec3(2.2)),.3,.8,.18);if(index == 5) return Blob(vec2(-.575,-.9),vec2(.4,.2),pow(vec3(.42,.55,.78),vec3(2.2)),.5,1.,.65);if(index == 6) return Blob(vec2(-.7,-.77),vec2(.125,.065),pow(vec3(.55,.66,.85),vec3(2.2)),.2,.85,.1);if(index == 7) return Blob(vec2(-.6,-1.),vec2(.16,.25),pow(vec3(.30,.45,.72),vec3(2.2)),.3,1.,-.35);if(index == 8) return Blob(vec2(-1.,-1.),vec2(.45,.3),pow(vec3(.76,.88,1.),vec3(2.2)),.4,.8,0.);return Blob(vec2(-.4,-.8),vec2(.1,.2),pow(vec3(.475,.702,.925),vec3(2.2)),.3,1.,-.35);}else if(set == 1.0) {if(index == 0) return Blob(vec2(1.2,1.0),vec2(1.25,1.25),pow(vec3(.76,.88,1.),vec3(2.2)),.6,1.,0.);if(index == 1) return Blob(vec2(0.6,0.85),vec2(0.3,0.15),pow(vec3(.475,.702,.925),vec3(2.2)),.2,.9,1.0);if(index == 2) return Blob(vec2(0.9,0.6),vec2(0.35,0.2),pow(vec3(.475,.702,.925),vec3(2.2)),.1,.9,0.6);if(index == 3) return Blob(vec2(1.0,0.75),vec2(0.35,0.2),pow(vec3(.55,.66,.85),vec3(2.2)),.2,.9,0.4);if(index == 4) return Blob(vec2(0.68,0.95),vec2(0.45,0.25),pow(vec3(.42,.55,.78),vec3(2.2)),.3,.9,0.6);return Blob(vec2(0.65,0.95),vec2(0.3,0.15),pow(vec3(.30,.45,.72),vec3(2.2)),.3,.7,0.6);}else {if(index == 0) return Blob(vec2(1.2,-1.0),vec2(1.1,1.1),pow(vec3(.76,.88,1.),vec3(2.2)),.7,1.,0.);if(index == 1) return Blob(vec2(1.2,-0.5),vec2(0.6,0.6),pow(vec3(.475,.702,.925),vec3(2.2)),.4,1.,0.);if(index == 2) return Blob(vec2(0.9,-1.0),vec2(0.5,0.35),pow(vec3(.55,.66,.85),vec3(2.2)),.5,1.,-0.8);return Blob(vec2(0.95,-0.9),vec2(0.35,0.25),pow(vec3(.30,.45,.72),vec3(2.2)),.35,.8,-0.8);}}float noise(vec2 st){vec2 i=floor(st);vec2 f=fract(st);float a=fract(sin(dot(i,vec2(12.9898,78.233)))*43758.5453);float b=fract(sin(dot(i+vec2(1.,0.),vec2(12.9898,78.233)))*43758.5453);float c=fract(sin(dot(i+vec2(0.,1.),vec2(12.9898,78.233)))*43758.5453);float d=fract(sin(dot(i+vec2(1.,1.),vec2(12.9898,78.233)))*43758.5453);vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}vec2 rotate2D(vec2 p,float a){float s=sin(a);float c=cos(a);return vec2(p.x*c-p.y*s,p.x*s+p.y*c);}float getBlobAlpha(vec2 uv,vec2 c,vec2 s,float b,float r){vec2 p=uv*2.-1.;p-=c;p=rotate2D(p,r);p=vec2(p.x/s.x,p.y/s.y);float d=length(p)+.15*noise(p*3.+u_time*.5);return smoothstep(1.,b,d);}void main(){vec2 uv=vUv;vec3 col=vec3(.984,.988,.992);if(u_blobSet==2.0)col=vec3(.086,.102,.133);float alpha=0.;int maxBlobs=10;if(u_blobSet==1.0)maxBlobs=6;else if(u_blobSet==2.0)maxBlobs=4;for(int i=0;i<maxBlobs;i++){Blob blob=getBlob(i,u_blobSet);float a=getBlobAlpha(uv,blob.position,blob.size,blob.blur,blob.rotation);a*=blob.opacity;col=mix(col,blob.color,a);alpha=clamp(alpha+a,0.,1.);}gl_FragColor=vec4(col,alpha);}`;

      // Track all active blob instances so the visibility
      // change listener can pause/resume all of them at once
      const allInstances = [];

      function initBlobCanvas(container, blobSet = 0.0, anchor) {
        const canvas = document.createElement("canvas");
        container.appendChild(canvas);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // Cap pixel ratio to avoid massive textures on retina screens

        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
        camera.position.z = 1;

        const uniforms = {
          u_time: { value: 0 },
          u_resolution: { value: new THREE.Vector2() },
          u_blobSet: { value: blobSet }
        };

        const geometry = new THREE.PlaneGeometry(2, 2);
        const material = new THREE.ShaderMaterial({
          vertexShader,
          fragmentShader,
          uniforms,
          transparent: true
        });

        scene.add(new THREE.Mesh(geometry, material));
        const clock = new THREE.Clock();

        // --- State flags ---
        // isInView: set by IntersectionObserver — true when the container
        //           is at least 1px visible in the viewport
        // isTabActive: set by the visibilitychange listener — false when
        //              the user switches to another tab or minimises the window
        // animFrameId: lets us cancel a pending requestAnimationFrame so we
        //              don't queue up multiple loops after re-enabling
        let isInView = false;
        let isTabActive = !document.hidden;
        let animFrameId = null;

        // --- Resize ---
        function resize() {
          const viewportWidth = window.innerWidth;

          let width = viewportWidth;
          if (blobSet === 0.0) {
            width = Math.max(viewportWidth, 1440);
          } else if (blobSet === 1.0) {
            width = Math.max(viewportWidth, 800);
          }

          const height = width / (16 / 9);

          canvas.style.width = `${width}px`;
          canvas.style.height = `${height}px`;

          const align = anchor.getAttribute("data-align") || "center";
          canvas.style.top = "";
          canvas.style.left = "";
          canvas.style.right = "";
          canvas.style.bottom = "";

          if (align === "bottom-left") {
            canvas.style.left = "0";
            canvas.style.bottom = "0";
            canvas.style.transform = "translate(0%, 0%)";
          } else if (align === "top-right") {
            canvas.style.right = "0";
            canvas.style.top = "0";
            canvas.style.transform = "translate(0%, 0%)";
          } else if (align === "bottom-right") {
            canvas.style.right = "0";
            canvas.style.bottom = "0";
            canvas.style.transform = "translate(0%, 0%)";
          } else {
            canvas.style.top = "50%";
            canvas.style.left = "50%";
            canvas.style.transform = "translate(-50%, -50%)";
          }

          renderer.setSize(width, height, false);
          uniforms.u_resolution.value.set(width, height);
        }

        window.addEventListener("resize", resize);
        resize();

        // --- Animation loop ---
        // Only runs when both conditions are met:
        //   1. The blob container is visible in the viewport (isInView)
        //   2. The browser tab is active (isTabActive)
        function animate() {
          if (!isInView || !isTabActive) {
            animFrameId = null; // Loop exits — will be restarted by resume()
            return;
          }
          animFrameId = requestAnimationFrame(animate);
          uniforms.u_time.value = clock.getElapsedTime();
          renderer.render(scene, camera);
        }

        // --- Resume / pause helpers ---
        // resume() is called by both the IntersectionObserver and the
        // visibilitychange listener whenever conditions might allow rendering.
        // It guards against starting a second loop if one is already running.
        function resume() {
          if (isInView && isTabActive && animFrameId === null) {
            clock.start();
            animate();
          }
        }

        function pause() {
          if (animFrameId !== null) {
            cancelAnimationFrame(animFrameId);
            animFrameId = null;
          }
          clock.stop();
        }

        // --- Intersection Observer ---
        // Watches the *container* div (the thing you position in Webflow).
        // threshold: 0 means the callback fires as soon as even 1px enters
        // or leaves the viewport — good balance between responsiveness and
        // not toggling too aggressively on large blobs.
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              isInView = entry.isIntersecting;
              if (isInView) {
                resume();
              } else {
                pause();
              }
            });
          },
          { threshold: 0 }
        );

        observer.observe(container);

        // Expose tab-state setter so the shared visibilitychange
        // listener below can reach into each instance
        allInstances.push({
          setTabActive(active) {
            isTabActive = active;
            if (active) {
              resume();
            } else {
              pause();
            }
          }
        });
      }

      // --- Tab visibility (shared, fires once for the whole page) ---
      // Iterates every blob instance and tells it whether the tab is active.
      document.addEventListener("visibilitychange", () => {
        const active = !document.hidden;
        allInstances.forEach((instance) => instance.setTabActive(active));
      });

      // --- Boot ---
      document.querySelectorAll(".blob-canvas-anchor").forEach((anchor) => {
        const container = anchor.parentElement;
        const blobSet = parseFloat(anchor.getAttribute("data-blob-set")) || 0.0;
        initBlobCanvas(container, blobSet, anchor);
      });
    };

    document.head.appendChild(script);
  });
</script>
